<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Piano</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&family=Playfair+Display:wght@400;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --fg: #f0ede6;
    --dim: #3a3732;
    --accent: #c8b89a;
    --glow: rgba(200, 184, 154, 0.15);
  }

  html, body { height: 100%; background: var(--bg); color: var(--fg); font-family: 'DM Mono', monospace; overflow: hidden; }
  body { display: flex; flex-direction: column; align-items: center; justify-content: center; }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 100;
    opacity: 0.4;
  }

  #main { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; gap: 2rem; }

  #start-btn {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--accent);
    background: transparent;
    border: 1px solid var(--dim);
    padding: 0.75rem 2rem;
    cursor: pointer;
    transition: border-color 0.3s, color 0.3s, box-shadow 0.3s;
    outline: none;
  }
  #start-btn:hover { border-color: var(--accent); box-shadow: 0 0 20px var(--glow); }
  #start-btn.active { color: var(--fg); border-color: var(--accent); box-shadow: 0 0 30px var(--glow); }

  #display {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 45vh;
    width: 100%;
  }

  #chord-name {
    font-family: 'Playfair Display', serif;
    font-size: clamp(4rem, 15vw, 10rem);
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1;
    text-align: center;
    transition: opacity 0.15s;
    min-height: 1.1em;
    display: flex;
    align-items: baseline;
    justify-content: center;
  }

  #chord-name.dim { opacity: 0.08; }

  #chord-name .root { color: var(--fg); }

  #chord-name .quality {
    font-family: 'DM Mono', monospace;
    font-size: 0.38em;
    font-weight: 400;
    color: var(--accent);
    margin-left: 0.06em;
    align-self: flex-start;
    margin-top: 0.15em;
    letter-spacing: 0.01em;
  }

  #chord-name .slash {
    font-family: 'DM Mono', monospace;
    font-size: 0.28em;
    font-weight: 300;
    color: var(--dim);
    margin-left: 0.12em;
    align-self: flex-end;
    margin-bottom: 0.12em;
    letter-spacing: 0.02em;
  }

  #chord-desc {
    font-size: 0.6rem;
    letter-spacing: 0.18em;
    color: var(--dim);
    text-transform: uppercase;
    margin-top: 0.5rem;
    min-height: 1rem;
  }

  #notes-row {
    display: flex;
    gap: 0.6rem;
    margin-top: 1.2rem;
    min-height: 2.2rem;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 85vw;
  }

  .note-pill {
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    letter-spacing: 0.08em;
    color: var(--accent);
    border: 1px solid var(--dim);
    border-radius: 2px;
    padding: 0.18rem 0.55rem;
    opacity: 0;
    transform: translateY(4px);
    transition: opacity 0.15s, transform 0.15s, border-color 0.2s, color 0.2s, box-shadow 0.2s;
  }
  .note-pill.visible { opacity: 1; transform: translateY(0); }
  .note-pill.is-root { color: var(--fg); border-color: var(--accent); box-shadow: 0 0 10px var(--glow); }
  .note-pill .oct { font-size: 0.7em; opacity: 0.45; vertical-align: sub; }

  #history {
    position: fixed;
    bottom: 2.5rem;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 1.5rem;
    align-items: center;
    height: 1.5rem;
  }

  .hist-item {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    color: var(--dim);
    white-space: nowrap;
  }

  #status {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: var(--dim);
    text-transform: uppercase;
    position: fixed;
    top: 2rem;
    left: 50%;
    transform: translateX(-50%);
  }

  #vu {
    display: flex;
    gap: 3px;
    align-items: flex-end;
    height: 24px;
    position: fixed;
    bottom: 5rem;
    left: 50%;
    transform: translateX(-50%);
  }

  .vu-bar {
    width: 3px;
    background: var(--dim);
    border-radius: 1px;
    transition: height 0.05s, background 0.1s;
    min-height: 2px;
  }
</style>
</head>
<body>
<div id="status">piano analyzer</div>
<div id="main">
  <div id="display">
    <div id="chord-name" class="dim"><span class="root">—</span></div>
    <div id="chord-desc"></div>
    <div id="notes-row"></div>
  </div>
  <button id="start-btn">listen</button>
</div>
<div id="vu"></div>
<div id="history"></div>

<script>
// ── Music theory ──────────────────────────────────────────────────
const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const NOTE_FLAT  = ['C','Db','D','Eb','E','F','Gb','G','Ab','A','Bb','B'];
const PREFER_FLAT = new Set([1,3,6,8,10]);

function noteName(pc) { return PREFER_FLAT.has(pc) ? NOTE_FLAT[pc] : NOTE_NAMES[pc]; }

function freqToNote(freq) {
  if (freq < 27.5 || freq > 4200) return null;
  const midi = Math.round(12 * Math.log2(freq / 440) + 69);
  if (midi < 21 || midi > 108) return null;
  return { midi, pc: midi % 12, name: NOTE_NAMES[midi % 12], octave: Math.floor(midi / 12) - 1 };
}

// Each template: i = intervals from root (mod 12), s = chord suffix, d = description
const CHORD_TEMPLATES = [
  // Triads
  { i:[0,4,7],      s:'',      d:'major'            },
  { i:[0,3,7],      s:'m',     d:'minor'             },
  { i:[0,3,6],      s:'°',     d:'diminished'        },
  { i:[0,4,8],      s:'+',     d:'augmented'         },
  { i:[0,5,7],      s:'sus4',  d:'suspended 4th'     },
  { i:[0,2,7],      s:'sus2',  d:'suspended 2nd'     },
  // 7ths
  { i:[0,4,7,11],   s:'M7',    d:'major 7th'         },
  { i:[0,4,7,10],   s:'7',     d:'dominant 7th'      },
  { i:[0,3,7,10],   s:'m7',    d:'minor 7th'         },
  { i:[0,3,6,10],   s:'m7♭5',  d:'half-diminished'   },
  { i:[0,3,6,9],    s:'°7',    d:'diminished 7th'    },
  { i:[0,4,8,10],   s:'+7',    d:'aug dominant 7th'  },
  { i:[0,3,7,11],   s:'mM7',   d:'minor-major 7th'   },
  // 6ths
  { i:[0,4,7,9],    s:'6',     d:'major 6th'         },
  { i:[0,3,7,9],    s:'m6',    d:'minor 6th'         },
  // Add chords
  { i:[0,2,4,7],    s:'add9',  d:'add 9'             },
  { i:[0,4,5,7],    s:'add4',  d:'add 4'             },
  // 9ths (flexible — 7th optional in detection)
  { i:[0,4,7,10,2], s:'9',     d:'dominant 9th'      },
  { i:[0,4,7,11,2], s:'M9',    d:'major 9th'         },
  { i:[0,3,7,10,2], s:'m9',    d:'minor 9th'         },
].map(t => ({ ...t, norm: [...new Set(t.i.map(v => v % 12))].sort((a,b)=>a-b) }));

function identifyChord(pcs, lowestPc) {
  if (pcs.length < 2) return null;
  const pcSet = new Set(pcs);
  let best = null, bestScore = -Infinity;

  for (const root of pcs) {
    for (const tmpl of CHORD_TEMPLATES) {
      const needed  = tmpl.norm.map(i => (root + i) % 12);
      const matches = needed.filter(n => pcSet.has(n)).length;

      // Require root match and at least 2 notes total, plus ≥50% coverage
      if (!pcSet.has(root)) continue;
      if (matches < 2) continue;
      const coverage  = matches / tmpl.norm.length;
      if (coverage < 0.5) continue;

      // Precision: fraction of detected pcs that belong to this chord
      const precision = matches / pcs.length;
      const score = coverage * 0.65 + precision * 0.35;

      if (score > bestScore) {
        bestScore = score;
        const slash = (lowestPc !== undefined && lowestPc !== root && pcSet.has(lowestPc))
          ? noteName(lowestPc) : '';
        best = { root: noteName(root), rootPc: root, suffix: tmpl.s, desc: tmpl.d, slash };
      }
    }
  }
  return best;
}

// ── Harmonic suppression ──────────────────────────────────────────
// Piano produces strong overtones. Remove peaks that are integer multiples
// of a louder peak's frequency to avoid counting harmonics as separate notes.
function suppressHarmonics(peaks) {
  const sorted = [...peaks].sort((a, b) => b.amp - a.amp);
  const keep = [];
  for (const p of sorted) {
    let isHarmonic = false;
    for (const k of keep) {
      const ratio = p.freq / k.freq;
      for (let h = 2; h <= 8; h++) {
        if (Math.abs(ratio - h) / h < 0.025) { isHarmonic = true; break; }
      }
      if (isHarmonic) break;
    }
    if (!isHarmonic) keep.push(p);
  }
  return keep;
}

// ── Audio ─────────────────────────────────────────────────────────
let audioCtx, analyser, source, animFrame;
const FFT_SIZE = 8192;
const SILENCE_THRESHOLD = 20;

const chordEl  = document.getElementById('chord-name');
const descEl   = document.getElementById('chord-desc');
const notesRow = document.getElementById('notes-row');
const histEl   = document.getElementById('history');
const statusEl = document.getElementById('status');
const startBtn = document.getElementById('start-btn');
const vuEl     = document.getElementById('vu');

const VU_COUNT = 20;
for (let i = 0; i < VU_COUNT; i++) {
  const b = document.createElement('div');
  b.className = 'vu-bar'; b.style.height = '2px';
  vuEl.appendChild(b);
}
const vuBars = Array.from(vuEl.children);

let history   = [];
let lastLabel = '';
let silenceTimer = null;

// Stability: rolling vote over last N frames
const VOTE_WINDOW = 5;
const labelBuf = [];
function stableLabel(label) {
  labelBuf.push(label);
  if (labelBuf.length > VOTE_WINDOW) labelBuf.shift();
  const counts = {};
  for (const l of labelBuf) counts[l] = (counts[l] || 0) + 1;
  let best = null, bestN = 0;
  for (const [l, n] of Object.entries(counts)) {
    if (n > bestN) { best = l; bestN = n; }
  }
  return bestN >= Math.ceil(VOTE_WINDOW * 0.6) ? best : null;
}

function pickPeaks(freqData, sampleRate) {
  const nyquist = sampleRate / 2;
  const binSize = nyquist / freqData.length;
  const minBin  = Math.floor(27.5 / binSize);
  const maxBin  = Math.ceil(4200  / binSize);
  const raw = [];

  for (let i = minBin + 1; i < maxBin - 1; i++) {
    const v = freqData[i];
    if (v > SILENCE_THRESHOLD && v > freqData[i-1] && v > freqData[i+1]) {
      // Parabolic interpolation for sub-bin frequency accuracy
      const denom = freqData[i-1] - 2*v + freqData[i+1];
      const offset = denom !== 0 ? 0.5 * (freqData[i-1] - freqData[i+1]) / denom : 0;
      const freq = (i + offset) * binSize;
      const note = freqToNote(freq);
      if (note) {
        const ex = raw.find(p => p.note.midi === note.midi);
        if (ex) { if (v > ex.amp) { ex.amp = v; ex.freq = freq; } }
        else raw.push({ freq, amp: v, note });
      }
    }
  }

  raw.sort((a, b) => b.amp - a.amp);
  const top = suppressHarmonics(raw.slice(0, 10));
  return top.slice(0, 6);
}

function renderChord(result, rawNames) {
  chordEl.innerHTML = '';
  if (!result) {
    const r = document.createElement('span');
    r.className = 'root';
    r.textContent = rawNames.join(' ');
    chordEl.appendChild(r);
    descEl.textContent = rawNames.length === 2 ? 'interval' : '';
    return;
  }
  const r = document.createElement('span');
  r.className = 'root'; r.textContent = result.root;
  chordEl.appendChild(r);
  if (result.suffix) {
    const q = document.createElement('span');
    q.className = 'quality'; q.textContent = result.suffix;
    chordEl.appendChild(q);
  }
  if (result.slash) {
    const s = document.createElement('span');
    s.className = 'slash'; s.textContent = '/' + result.slash;
    chordEl.appendChild(s);
  }
  descEl.textContent = result.desc;
}

function renderNotePills(peaks, rootPc) {
  notesRow.innerHTML = '';
  [...peaks].sort((a, b) => a.note.midi - b.note.midi).forEach(p => {
    const pill = document.createElement('span');
    pill.className = 'note-pill visible' + (p.note.pc === rootPc ? ' is-root' : '');
    pill.innerHTML = p.note.name + `<span class="oct">${p.note.octave}</span>`;
    notesRow.appendChild(pill);
  });
}

function renderHistory() {
  histEl.innerHTML = '';
  history.slice(1).forEach((h, i) => {
    const el = document.createElement('span');
    el.className = 'hist-item';
    el.textContent = h;
    el.style.opacity = (0.4 - i * 0.07).toString();
    histEl.appendChild(el);
  });
}

function loop() {
  animFrame = requestAnimationFrame(loop);

  const freqData = new Uint8Array(analyser.frequencyBinCount);
  const timeData = new Uint8Array(analyser.fftSize);
  analyser.getByteFrequencyData(freqData);
  analyser.getByteTimeDomainData(timeData);

  // VU meter
  let rms = 0;
  for (let i = 0; i < timeData.length; i++) rms += (timeData[i] - 128) ** 2;
  rms = Math.sqrt(rms / timeData.length);
  const vuNorm = Math.min(rms / 40, 1);
  vuBars.forEach((bar, i) => {
    const t = i / VU_COUNT;
    if (vuNorm > t) {
      bar.style.height = (3 + Math.random() * 18 * vuNorm) + 'px';
      bar.style.background = `rgba(200,184,154,${0.3 + 0.7 * vuNorm})`;
    } else {
      bar.style.height = '2px';
      bar.style.background = 'var(--dim)';
    }
  });

  const peaks = pickPeaks(freqData, audioCtx.sampleRate);

  if (peaks.length === 0) {
    if (!silenceTimer) {
      silenceTimer = setTimeout(() => {
        chordEl.innerHTML = '<span class="root">—</span>';
        chordEl.classList.add('dim');
        descEl.textContent = '';
        notesRow.innerHTML = '';
        lastLabel = '';
        labelBuf.length = 0;
      }, 400);
    }
    return;
  }

  clearTimeout(silenceTimer);
  silenceTimer = null;
  chordEl.classList.remove('dim');

  const pcs      = [...new Set(peaks.map(p => p.note.pc))];
  const lowestPc = peaks.reduce((low, p) => p.note.midi < low.midi ? p.note : low, peaks[0].note).pc;
  const result   = pcs.length >= 2 ? identifyChord(pcs, lowestPc) : null;

  let label;
  if (pcs.length === 1) {
    label = peaks[0].note.name;
  } else if (result) {
    label = result.root + result.suffix + (result.slash ? '/' + result.slash : '');
  } else {
    label = [...new Set(peaks.map(p => p.note.name))].join('+');
  }

  const stable = stableLabel(label);
  if (stable && stable !== lastLabel) {
    lastLabel = stable;
    const rawNames = [...new Set(peaks.map(p => p.note.name))];
    renderChord(result, rawNames);
    history.unshift(stable);
    history = history.slice(0, 6);
    renderHistory();
  }

  // Note pills update every frame (responsive)
  renderNotePills(peaks, result?.rootPc ?? peaks[0]?.note.pc);
}

// ── Start / Stop ──────────────────────────────────────────────────
let running = false;

startBtn.addEventListener('click', async () => {
  if (running) {
    running = false;
    cancelAnimationFrame(animFrame);
    if (source) source.disconnect();
    if (audioCtx) audioCtx.close();
    startBtn.textContent = 'listen';
    startBtn.classList.remove('active');
    statusEl.textContent = 'piano analyzer';
    chordEl.innerHTML = '<span class="root">—</span>';
    chordEl.classList.add('dim');
    descEl.textContent = '';
    notesRow.innerHTML = '';
    vuBars.forEach(b => { b.style.height = '2px'; b.style.background = 'var(--dim)'; });
    return;
  }

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false }
    });
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = FFT_SIZE;
    analyser.smoothingTimeConstant = 0.75;
    source = audioCtx.createMediaStreamSource(stream);
    source.connect(analyser);
    running = true;
    startBtn.textContent = 'stop';
    startBtn.classList.add('active');
    statusEl.textContent = 'listening';
    chordEl.classList.remove('dim');
    chordEl.innerHTML = '<span class="root">—</span>';
    loop();
  } catch(e) {
    statusEl.textContent = 'mic denied';
    console.error(e);
  }
});
</script>
</body>
</html>

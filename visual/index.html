<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inria+Serif:wght@300;400;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <title>Harmonia</title>
  <style>
    :root {
      --edge-gap: 20px;
      --pink-light: #F1ADFF;
      --pink-dark: #AC2A9E;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; overflow: hidden; }
    body {
      background: #08090d;
      color: #f5f2ff;
      font-family: "Poppins", sans-serif;
      height: 100dvh;
      min-height: 100dvh;
    }
    h1, h2, h3 {
      font-family: "Inria Serif", serif;
    }
    p, button, input, select, textarea, .small {
      font-family: "Poppins", sans-serif;
    }
    #app {
      height: 100dvh;
      min-height: 100dvh;
      padding: 0;
    }
    .intro-overlay {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background: rgba(10, 12, 18, 0.42);
      backdrop-filter: blur(10px);
      z-index: 6;
    }
    .landing-card {
      position: relative;
      width: fit-content;
      max-width: min(100%, calc(100vw - 48px));
      border-radius: 26px;
      overflow: hidden;
    }
    .landing-hero {
      display: block;
      width: auto;
      height: auto;
      max-width: 100%;
    }
    .landing-actions {
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
    }
    .landing-start {
      position: absolute;
      left: 30px;
      bottom: 18px;
      border: 1px solid rgba(255, 255, 255, 0.65);
      color: #482f47;
      background: #ffffff;
      border-radius: 999px;
      padding: 11px 42px;
      font-family: "Poppins", sans-serif;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      pointer-events: auto;
    }
    .practice-screen {
      position: relative;
      width: 100%;
      height: 100dvh;
      min-height: 100dvh;
      display: grid;
      grid-template-rows: minmax(0, 1fr) minmax(0, 1fr);
      overflow: hidden;
    }
    .keyboard-section {
      position: relative;
      display: grid;
      align-items: center;
      justify-items: center;
      align-content: center;
      gap: 10px;
      min-height: 0;
      overflow: hidden;
    }
    .app-logo {
      position: absolute;
      top: var(--edge-gap);
      left: var(--edge-gap);
      width: auto;
      height: auto;
      object-fit: contain;
      pointer-events: none;
      z-index: 4;
    }
    .music-picker {
      position: absolute;
      top: var(--edge-gap);
      right: var(--edge-gap);
      z-index: 4;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: rgba(245, 242, 255, 0.74);
      font-size: 12px;
      font-weight: 500;
    }
    .music-picker select {
      appearance: none;
      border: 1px solid rgba(199, 189, 255, 0.32);
      border-radius: 999px;
      color: #f6f4ff;
      background:
        linear-gradient(45deg, transparent 50%, rgba(246, 244, 255, 0.82) 50%) right 14px center / 6px 6px no-repeat,
        linear-gradient(135deg, rgba(246, 244, 255, 0.82) 50%, transparent 50%) right 10px center / 6px 6px no-repeat,
        rgba(255, 255, 255, 0.04);
      padding: 8px 28px 8px 12px;
      font-size: 13px;
      cursor: pointer;
    }
    .visualizer-toggle {
      position: absolute;
      top: calc(var(--edge-gap) + 42px);
      right: var(--edge-gap);
      z-index: 4;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 12px;
      border: 1px solid rgba(199, 189, 255, 0.24);
      border-radius: 999px;
      color: rgba(245, 242, 255, 0.78);
      background: rgba(255, 255, 255, 0.04);
      font-size: 12px;
      cursor: pointer;
      user-select: none;
    }
    .visualizer-toggle input {
      width: 14px;
      height: 14px;
      accent-color: var(--pink-light);
      cursor: pointer;
    }
    .hand-selector {
      display: inline-flex;
      gap: 8px;
      justify-self: center;
      align-self: end;
      z-index: 2;
    }
    .hand-button {
      min-width: 120px;
      border: 1px solid rgba(199, 189, 255, 0.32);
      color: #f6f4ff;
      background: rgba(255, 255, 255, 0.04);
      border-radius: 12px;
      padding: 8px 12px;
      cursor: pointer;
    }
    .hand-button.active {
      border-color: color-mix(in srgb, var(--pink-dark) 72%, transparent);
      background: linear-gradient(
        180deg,
        color-mix(in srgb, var(--pink-light) 32%, transparent),
        color-mix(in srgb, var(--pink-dark) 20%, transparent)
      );
      box-shadow: 0 0 14px color-mix(in srgb, var(--pink-dark) 30%, transparent);
    }
    .feedback-section {
      position: relative;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      height: 100%;
      min-height: 0;
      overflow: hidden;
    }
    .practice-progress {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 4px 12px;
      align-items: center;
      padding: 6px 12px 4px;
    }
    #status {
      font-size: 18px;
      font-weight: 600;
      color: #f6f4ff;
      letter-spacing: 0.01em;
    }
    #progress-text {
      font-size: 14px;
    }
    .practice-progress .progress {
      grid-column: 1 / -1;
      margin-top: 2px;
      height: 5px;
      transition: background 140ms ease, box-shadow 140ms ease;
    }
    .practice-progress.practice-progress--sounding .progress {
      background: rgba(246, 244, 255, 0.14);
      box-shadow: 0 0 18px rgba(246, 244, 255, 0.18);
      animation: progress-sound-pulse 700ms ease-out;
    }
    .practice-progress.practice-progress--sounding .progress > span {
      filter: brightness(1.35);
      box-shadow: 0 0 18px rgba(246, 244, 255, 0.38);
    }
    .practice-progress.practice-progress--correct .progress {
      background: rgba(103, 255, 178, 0.18);
      box-shadow: 0 0 20px rgba(103, 255, 178, 0.34);
    }
    .practice-progress.practice-progress--correct .progress > span {
      background: linear-gradient(90deg, #67ffb2 0%, #d9ffee 100%);
      box-shadow: 0 0 18px rgba(103, 255, 178, 0.62);
    }
    .practice-progress.practice-progress--correct #status {
      color: #d9ffee;
      text-shadow: 0 0 14px rgba(103, 255, 178, 0.42);
    }
    @keyframes progress-sound-pulse {
      0% {
        transform: scaleY(1);
      }
      26% {
        transform: scaleY(1.45);
      }
      100% {
        transform: scaleY(1);
      }
    }
    .feedback-playground {
      position: relative;
      width: 100%;
      height: 100%;
      min-height: 0;
      overflow: hidden;
      border-top: 1px solid rgba(175, 165, 255, 0.2);
      background: #08090d;
    }
    .feedback-playground.feedback-playground--visualizer-off .designer-stage,
    .feedback-playground.feedback-playground--visualizer-off .target-line {
      display: none;
    }
    .feedback-playground.feedback-playground--visualizer-off {
      background: #08090d;
    }
    .feedback-playground::after {
      content: "Correct";
      position: absolute;
      right: 18px;
      top: 16px;
      z-index: 3;
      padding: 7px 11px;
      border: 1px solid rgba(105, 255, 185, 0.8);
      border-radius: 999px;
      color: #ddffef;
      background: rgba(36, 130, 86, 0.32);
      box-shadow: 0 0 22px rgba(105, 255, 185, 0.42);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      opacity: 0;
      transform: translateY(-4px) scale(0.96);
      transition: opacity 120ms ease, transform 120ms ease;
      pointer-events: none;
    }
    .feedback-playground.feedback-playground--correct {
      box-shadow: inset 0 0 0 2px rgba(105, 255, 185, 0.72), inset 0 0 42px rgba(105, 255, 185, 0.12);
    }
    .feedback-playground.feedback-playground--correct::after {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
    .feedback-playground.feedback-playground--sounding {
      animation: target-sound-pulse 700ms ease-out;
    }
    .feedback-playground.feedback-playground--sounding .target-line {
      box-shadow: 0 0 18px rgba(246, 244, 255, 0.34);
      background: rgba(246, 244, 255, 0.72);
    }
    @keyframes target-sound-pulse {
      0% {
        filter: brightness(1);
        box-shadow: inset 0 0 0 0 rgba(246, 244, 255, 0);
      }
      28% {
        filter: brightness(1.12);
        box-shadow: inset 0 0 0 2px rgba(246, 244, 255, 0.18), inset 0 0 36px rgba(246, 244, 255, 0.08);
      }
      100% {
        filter: brightness(1);
        box-shadow: inset 0 0 0 0 rgba(246, 244, 255, 0);
      }
    }
    .designer-stage {
      position: absolute;
      inset: 0;
    }
    .target-line {
      position: absolute;
      top: var(--edge-gap);
      bottom: var(--edge-gap);
      width: 2px;
      background: rgba(255, 255, 255, 0.45);
      z-index: 1;
      transition: background 120ms ease, box-shadow 120ms ease;
    }
    .target-line.target-line--correct {
      background: #67ffb2;
      box-shadow: 0 0 10px rgba(103, 255, 178, 0.6);
    }
    .target-line.target-line--incorrect {
      background: #ff6262;
      box-shadow: 0 0 10px rgba(255, 98, 98, 0.5);
    }
    .target-line--pink {
      left: 33.333%;
      transform: translateX(-50%);
    }
    .target-line--orange {
      left: 66.666%;
      transform: translateX(-50%);
    }
    .target-line--green {
      left: 50%;
      transform: translateX(-50%);
    }
    .shell {
      margin: 0 auto;
      max-width: 760px;
      display: grid;
      gap: 18px;
    }
    .shell.wide {
      max-width: 1120px;
      grid-template-columns: 320px 1fr;
      align-items: start;
    }
    .card {
      background: rgba(26, 24, 44, 0.7);
      border: 1px solid rgba(157, 122, 255, 0.28);
      border-radius: 18px;
      padding: 18px 20px;
      box-shadow: 0 18px 44px rgba(0, 0, 0, 0.35), inset 0 0 24px rgba(150, 96, 255, 0.09);
      backdrop-filter: blur(8px);
    }
    .glow-card {
      border-color: rgba(117, 255, 193, 0.4);
      box-shadow: 0 14px 40px rgba(0, 0, 0, 0.45), 0 0 24px rgba(117, 255, 193, 0.16);
    }
    h2, h3 {
      margin: 0 0 8px;
      font-weight: 600;
      letter-spacing: 0.01em;
    }
    p {
      margin: 0;
      color: #c9c5da;
      line-height: 1.45;
    }
    .small {
      margin-top: 10px;
      font-size: 13px;
      color: #9f99bc;
    }
    #debug {
      display: none;
    }
    .buttons {
      margin-top: 16px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    button {
      border: 1px solid rgba(199, 189, 255, 0.32);
      color: #f6f4ff;
      background: rgba(255, 255, 255, 0.04);
      border-radius: 12px;
      padding: 10px 14px;
      cursor: pointer;
    }
    button.primary {
      border-color: color-mix(in srgb, var(--pink-dark) 72%, transparent);
      background: linear-gradient(
        180deg,
        color-mix(in srgb, var(--pink-light) 32%, transparent),
        color-mix(in srgb, var(--pink-dark) 20%, transparent)
      );
      box-shadow: 0 0 16px color-mix(in srgb, var(--pink-dark) 28%, transparent);
    }
    button.ghost {
      border-color: rgba(196, 187, 255, 0.35);
    }
    .mode button {
      min-width: 120px;
    }
    .progress {
      margin-top: 12px;
      width: 100%;
      height: 10px;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 999px;
      overflow: hidden;
    }
    .progress > span {
      display: block;
      height: 100%;
      background: linear-gradient(90deg, var(--pink-light) 0%, var(--pink-dark) 100%);
      box-shadow: 0 0 12px color-mix(in srgb, var(--pink-dark) 36%, transparent);
    }
    .overlay-root,
    .cue-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }
    .target-cue {
      position: absolute;
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      mix-blend-mode: screen;
    }
    .calibration-box {
      position: absolute;
      border: 2px dashed rgba(146, 241, 255, 0.95);
      border-radius: 10px;
      box-shadow: inset 0 0 0 1px rgba(18, 14, 35, 0.8);
      cursor: move;
    }
    .drag-handle {
      position: absolute;
      right: -8px;
      bottom: -8px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--pink-light);
      box-shadow: 0 0 12px color-mix(in srgb, var(--pink-light) 70%, transparent);
      cursor: nwse-resize;
    }
    .sim-dot {
      position: absolute;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #ffffff;
      box-shadow: 0 0 8px rgba(255, 255, 255, 0.8);
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 3;
    }
    .heat-orb {
      position: absolute;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 2;
    }
    .heat-orb.success {
      box-shadow: 0 0 32px color-mix(in srgb, var(--pink-light) 70%, transparent);
      animation: pulse 0.8s ease-in-out infinite alternate;
    }
    @keyframes pulse {
      from { transform: translate(-50%, -50%) scale(1); }
      to { transform: translate(-50%, -50%) scale(1.08); }
    }
    @media (max-width: 980px) {
      .practice-screen {
        grid-template-rows: 1fr 1fr;
      }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Harmonia</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; overflow: hidden; }
    body {
      background: #08090d;
      color: #f5f2ff;
      font-family: Inter, system-ui, sans-serif;
      height: 100dvh;
      min-height: 100dvh;
    }
    #app {
      height: 100dvh;
      min-height: 100dvh;
      padding: 0;
    }
    .practice-screen {
      width: 100%;
      height: 100dvh;
      min-height: 100dvh;
      display: grid;
      grid-template-rows: 1fr 1fr;
      overflow: hidden;
    }
    .keyboard-section {
      display: grid;
      align-items: center;
      justify-items: center;
      align-content: center;
      gap: 10px;
      min-height: 0;
      overflow: hidden;
    }
    .hand-selector {
      display: inline-flex;
      gap: 8px;
      justify-self: center;
      align-self: end;
      z-index: 2;
    }
    .hand-button {
      min-width: 120px;
      border: 1px solid rgba(199, 189, 255, 0.32);
      color: #f6f4ff;
      background: rgba(255, 255, 255, 0.04);
      border-radius: 12px;
      padding: 8px 12px;
      cursor: pointer;
    }
    .hand-button.active {
      border-color: rgba(117, 255, 193, 0.65);
      background: linear-gradient(180deg, rgba(117,255,193,0.28), rgba(117,255,193,0.11));
      box-shadow: 0 0 16px rgba(117, 255, 193, 0.22);
    }
    .feedback-section {
      position: relative;
      display: grid;
      grid-template-rows: auto 1fr;
      min-height: 0;
      overflow: hidden;
    }
    .feedback-playground {
      position: relative;
      width: 100%;
      height: auto;
      min-height: 0;
      overflow: hidden;
      border-top: 1px solid rgba(175, 165, 255, 0.2);
      background: #08090d;
    }
    .designer-stage {
      position: absolute;
      inset: 0;
    }
    .target-line {
      position: absolute;
      top: 32px;
      bottom: 32px;
      width: 2px;
      background: rgba(255, 255, 255, 0.45);
      z-index: 1;
    }
    .target-line--pink {
      left: 33.333%;
      transform: translateX(-50%);
    }
    .target-line--orange {
      left: 66.666%;
      transform: translateX(-50%);
    }
    .target-line--green {
      left: 50%;
      transform: translateX(-50%);
    }
    .shell {
      margin: 0 auto;
      max-width: 760px;
      display: grid;
      gap: 18px;
    }
    .shell.wide {
      max-width: 1120px;
      grid-template-columns: 320px 1fr;
      align-items: start;
    }
    .card {
      background: rgba(26, 24, 44, 0.7);
      border: 1px solid rgba(157, 122, 255, 0.28);
      border-radius: 18px;
      padding: 18px 20px;
      box-shadow: 0 18px 44px rgba(0, 0, 0, 0.35), inset 0 0 24px rgba(150, 96, 255, 0.09);
      backdrop-filter: blur(8px);
    }
    .glow-card {
      border-color: rgba(117, 255, 193, 0.4);
      box-shadow: 0 14px 40px rgba(0, 0, 0, 0.45), 0 0 24px rgba(117, 255, 193, 0.16);
    }
    h2, h3 {
      margin: 0 0 8px;
      font-weight: 600;
      letter-spacing: 0.01em;
    }
    p {
      margin: 0;
      color: #c9c5da;
      line-height: 1.45;
    }
    .small {
      margin-top: 10px;
      font-size: 13px;
      color: #9f99bc;
    }
    #debug {
      margin: 0;
      padding-top: 2px;
    }
    .buttons {
      margin-top: 16px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    button {
      border: 1px solid rgba(199, 189, 255, 0.32);
      color: #f6f4ff;
      background: rgba(255, 255, 255, 0.04);
      border-radius: 12px;
      padding: 10px 14px;
      cursor: pointer;
    }
    button.primary {
      border-color: rgba(117, 255, 193, 0.65);
      background: linear-gradient(180deg, rgba(117,255,193,0.28), rgba(117,255,193,0.11));
      box-shadow: 0 0 16px rgba(117, 255, 193, 0.22);
    }
    button.ghost {
      border-color: rgba(196, 187, 255, 0.35);
    }
    .mode button {
      min-width: 120px;
    }
    .progress {
      margin-top: 12px;
      width: 100%;
      height: 10px;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 999px;
      overflow: hidden;
    }
    .progress > span {
      display: block;
      height: 100%;
      background: linear-gradient(90deg, #ff6dc7 0%, #67ffb2 60%, #8e74ff 100%);
      box-shadow: 0 0 12px rgba(137, 128, 255, 0.35);
    }
    .overlay-root,
    .cue-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }
    .target-cue {
      position: absolute;
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      mix-blend-mode: screen;
    }
    .calibration-box {
      position: absolute;
      border: 2px dashed rgba(146, 241, 255, 0.95);
      border-radius: 10px;
      box-shadow: inset 0 0 0 1px rgba(18, 14, 35, 0.8);
      cursor: move;
    }
    .drag-handle {
      position: absolute;
      right: -8px;
      bottom: -8px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #65ffc6;
      box-shadow: 0 0 12px rgba(101, 255, 198, 0.72);
      cursor: nwse-resize;
    }
    .sim-dot {
      position: absolute;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #ffffff;
      box-shadow: 0 0 8px rgba(255, 255, 255, 0.8);
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 3;
    }
    .heat-orb {
      position: absolute;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 2;
    }
    .heat-orb.success {
      box-shadow: 0 0 32px rgba(105, 255, 185, 0.7);
      animation: pulse 0.8s ease-in-out infinite alternate;
    }
    @keyframes pulse {
      from { transform: translate(-50%, -50%) scale(1); }
      to { transform: translate(-50%, -50%) scale(1.08); }
    }
    @media (max-width: 980px) {
      .practice-screen {
        grid-template-rows: 1fr 1fr;
      }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
